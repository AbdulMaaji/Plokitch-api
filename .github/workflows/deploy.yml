name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Run Build Check (GHA Runner Gate)
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Trigger Remote Deployment Script & Health Gate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export GH_OAUTH_TOKEN="${{ secrets.GH_OAUTH_TOKEN }}"
            cd /root/Plokitch-api
            git remote set-url origin "https://${GH_OAUTH_TOKEN}@github.com/AbdulMaaji/Plokitch-api.git"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            git remote set-url origin "https://github.com/AbdulMaaji/Plokitch-api.git"
            bash deploy.sh
